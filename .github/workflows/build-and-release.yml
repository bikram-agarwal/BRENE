name: Build module zip and publish release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['module.prop']

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Resolve default branch (release and push only on default)
        id: branch_gate
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          CURRENT="${{ github.ref_name }}"
          if [ "$CURRENT" = "$DEFAULT_BRANCH" ]; then
            echo "on_default_branch=true" >> "$GITHUB_OUTPUT"
            echo "On default branch ($DEFAULT_BRANCH): GitHub release and git push will run after build."
          else
            echo "on_default_branch=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dry-run: branch '$CURRENT' is not the default ('$DEFAULT_BRANCH'). Build steps still run; release creation and push are skipped."
          fi

      - name: Check if build needed
        id: check
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2-)
          RESPONSE=$(curl -sS -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          PAYLOAD=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "No latest release or API error (HTTP $HTTP_CODE), will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LATEST_TAG=$(echo "$PAYLOAD" | jq -r '.tag_name // empty')
          if [ "$LATEST_TAG" = "$VERSION" ]; then
            echo "module.prop version $VERSION matches latest release tag, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "module.prop version $VERSION differs from latest release ($LATEST_TAG), will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Read version and set versionCode in module.prop for zip
        # BRENE keeps versionCode as 1, so I have to edit it to match the version
        id: version
        if: steps.check.outputs.should_build == 'true'
        run: |
          set +x
          VERSION=$(grep '^version=' module.prop | cut -d= -f2-)
          RAW=$(echo "$VERSION" | sed 's/^v//' | tr -d '.')
          VERSION_CODE=$((10#${RAW:-0}))
          sed -i "s/^versionCode=.*/versionCode=${VERSION_CODE}/" module.prop
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Using version=$VERSION from module.prop, setting versionCode=$VERSION_CODE"

      - name: Ensuring prop format
        if: steps.check.outputs.should_build == 'true'
        env:
          EXPECTED_UPDATE_JSON: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/update.json
        run: |
          sed -i '/^name=/ s/\.BRENE/BRENE/g' module.prop
          if ! grep -q 'Bikram-Agarwal' module.prop; then
            sed -i 's/ & /, /g' module.prop
            sed -i '/^author=/ s/$/ \& Bikram-Agarwal/' module.prop
          fi
          if grep -q '^updateJson=' module.prop; then
            sed -i "s|^updateJson=.*|updateJson=${EXPECTED_UPDATE_JSON}|" module.prop
          else
            printf '\nupdateJson=%s\n' "${EXPECTED_UPDATE_JSON}" >> module.prop
          fi
          echo "--- module.prop (right before zip build) ---"
          cat module.prop

      - name: Create module zip
        if: steps.check.outputs.should_build == 'true'
        run: |
          set +x
          zip -r "BRENE-${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "update.json"
          echo "Created BRENE-${{ steps.version.outputs.version }}.zip"
          ls -la "BRENE-${{ steps.version.outputs.version }}.zip"

      # Changelog text from the same upstream releases/latest call as sync (stored in repo variables).
      - name: Upstream release body
        id: upstream_notes
        if: steps.check.outputs.should_build == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail
          BODY_FILE="${RUNNER_TEMP}/upstream_body.md"
          set +e
          STORED_TAG=$(gh variable get UPSTREAM_LAST_SYNCED_RELEASE --repo "${GITHUB_REPOSITORY}" 2>/dev/null | tr -d '\r\n')
          TAG_EXIT=$?
          gh variable get UPSTREAM_LAST_RELEASE_BODY --repo "${GITHUB_REPOSITORY}" > "$BODY_FILE" 2>/dev/null
          BODY_EXIT=$?
          set -e
          if [ "$TAG_EXIT" -ne 0 ] || [ "$BODY_EXIT" -ne 0 ]; then
            echo "use_upstream_body=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$STORED_TAG" != "$VERSION" ]; then
            echo "use_upstream_body=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -s "$BODY_FILE" ]; then
            echo "use_upstream_body=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "use_upstream_body=true" >> "$GITHUB_OUTPUT"
          echo "body_path=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.should_build == 'true' && steps.branch_gate.outputs.on_default_branch == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: "BRENE-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: ${{ steps.upstream_notes.outputs.use_upstream_body != 'true' }}
          body_path: ${{ steps.upstream_notes.outputs.use_upstream_body == 'true' && steps.upstream_notes.outputs.body_path || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release body and update changelog.md
        if: steps.check.outputs.should_build == 'true' && steps.branch_gate.outputs.on_default_branch == 'true'
        run: |
          set +x
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          PAYLOAD=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Release API returned HTTP $HTTP_CODE"
            exit 1
          fi
          BODY=$(echo "$PAYLOAD" | jq -r '.body // empty')
          if [ -z "$BODY" ]; then
            BODY="(No release notes for this version.)"
          fi
          printf '## %s\n\n%s\n\n' "$VERSION" "$BODY" > changelog_section.md
          if [ -f changelog.md ]; then
            cat changelog_section.md changelog.md > changelog.md.tmp
          else
            cp changelog_section.md changelog.md.tmp
          fi
          mv changelog.md.tmp changelog.md
          rm -f changelog_section.md
          echo "--- changelog.md (right before update.json) ---"
          cat changelog.md

      - name: Write update.json and push
        if: steps.check.outputs.should_build == 'true'
        env:
          ON_DEFAULT_BRANCH: ${{ steps.branch_gate.outputs.on_default_branch }}
        run: |
          set +x
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.versionCode }}"
          BRANCH="${{ github.ref_name }}"
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/BRENE-${VERSION}.zip"
          CHANGELOG_URL="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/changelog.md"
          jq -n \
            --arg version "$VERSION" \
            --argjson versionCode $VERSION_CODE \
            --arg zipUrl "$ZIP_URL" \
            --arg changelog "$CHANGELOG_URL" \
            '{version: $version, versionCode: $versionCode, zipUrl: $zipUrl, changelog: $changelog}' > update.json
          echo "--- update.json (as would be committed) ---"
          cat update.json
          if [ "$ON_DEFAULT_BRANCH" != "true" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.prop update.json changelog.md
          if git diff --staged --quiet; then
            echo "No changes to module.prop, update.json or changelog.md"
          else
            git commit -m "chore(ci): sync module.prop, update.json and changelog.md for release ${VERSION}"
            git push origin HEAD
          fi

# Sync this fork's main with upstream (rrr333nnn333/BRENE) main.
# Run on a schedule or manually. After sync, run "Build module zip and publish release" when you want to build.
name: Sync upstream main

on:
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Fetch and merge upstream main
        run: |
          git remote add upstream https://github.com/rrr333nnn333/BRENE.git 2>/dev/null || true
          git fetch upstream main
          git merge upstream/main --no-edit
          git status

      - name: Push to origin main
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

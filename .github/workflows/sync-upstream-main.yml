# Sync this fork's main with upstream (rrr333nnn333/BRENE) main.
# Use a PAT in SYNC_PAT so a real push (when upstream had changes) triggers
# "Build module zip and publish release" when the diff touches module.prop.
name: Sync upstream main

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
          ref: main
          fetch-depth: 0

      - name: Fetch and merge upstream main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rrr333nnn333/BRENE.git 2>/dev/null || true
          git fetch upstream main
          git merge upstream/main -X theirs --no-edit
          git status

      - name: Push to origin main
        run: git push origin main
